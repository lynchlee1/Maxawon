[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "cretop-data-reader"
version = "1.0.0"
dependencies = [
    "openpyxl>=3.1.5",
    "scrapling>=0.4.8,<0.5",
]

[project.scripts]
cretop-data-reader = "cretop_data_reader.app:main"

[tool.setuptools.packages.find]
where = ["src"]
